name: "Deploy to AWS"

on: workflow_dispatch

jobs:
  deploy-AWS:
    runs-on: self-hosted
    steps:
      - name: Check out
        uses: actions/checkout@v2

      - name: Setup nodejs
        uses: actions/setup-node@v4

      - name: install nodejs
        run: sudo apt install nodejs

      - name: install npm 
        run: sudo apt install npm

      - name: install pm2
        sudo npm install -g pm2

      - name: Install packages
        run: npm install

      - name: Test
        run: npm test

      - name: deploy to Aws
        run: pm2 start src/index.js